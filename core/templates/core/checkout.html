{% extends 'core/base.html' %}

{% block content %}
<div class="bg-gray-50 min-h-screen pb-20 pt-6">
    <div class="max-w-md mx-auto px-4">
        <h2 class="text-2xl font-bold text-premium-green mb-6 text-center">Finalize Your Order</h2>

        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
            <h3 class="text-md font-bold text-gray-800 uppercase tracking-wider border-b pb-3 mb-4">Order Review</h3>
            
            <div id="checkout-items-list" class="divide-y divide-gray-100 max-h-[40vh] overflow-y-auto pr-1">
                </div>

            <div class="border-t pt-4 mt-4 space-y-2">
                <div class="flex justify-between text-sm text-gray-500">
                    <span>Subtotal</span>
                    <span id="checkout-subtotal">$0.00</span>
                </div>
                <div id="discount-row" class="flex justify-between text-sm text-red-500 hidden">
                    <span>Discount</span>
                    <span id="checkout-discount">-$0.00</span>
                </div>
                <div class="flex justify-between text-sm text-gray-500">
                    <span>Delivery Fee</span>
                    <span class="text-premium-green font-medium">FREE</span>
                </div>
                <div class="flex justify-between items-center border-t pt-3 mt-2">
                    <span class="font-bold text-gray-800">Total Bill</span>
                    <span id="checkout-grand-total" class="text-2xl font-bold text-premium-green">$0.00</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-6">
            <h3 class="text-md font-bold text-gray-800 uppercase tracking-wider border-b pb-3 mb-4">Delivery Details</h3>
            <form id="checkout-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Full Name</label>
                    <input type="text" required class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-premium-green" placeholder="Enter your name">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Phone Number</label>
                    <input type="tel" required class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-premium-green" placeholder="e.g. 03001234567">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Delivery Address</label>
                    <textarea required rows="3" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-premium-green resize-none" placeholder="House#, Street, Area Name..."></textarea>
                </div>

                <div class="border-t pt-4 mt-4">
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Have a Promo Code?</label>
                    <div class="flex space-x-2">
                        <input type="text" id="promo-input" class="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-xs uppercase tracking-wider focus:outline-none focus:border-premium-green" placeholder="e.g. ATLAS20">
                        <button type="button" onclick="applyPromoCode()" class="bg-gray-800 text-white text-xs px-4 py-2.5 font-bold rounded-xl hover:bg-opacity-90 transition">
                            Apply
                        </button>
                    </div>
                    <p id="promo-message" class="text-[11px] font-bold mt-1.5 hidden"></p>
                </div>

                <button type="submit" class="w-full bg-premium-green text-white font-bold py-4 rounded-xl shadow-lg uppercase tracking-wider hover:bg-opacity-95 transition-all mt-4">
                    Place Order (Cash on Delivery)
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    // LocalStorage engine key context parsing
    let cart = JSON.parse(localStorage.getItem('restaurant_cart')) || {};
    let discountPercentage = 0;

    document.addEventListener("DOMContentLoaded", function() {
        renderCheckoutOrder();

        // Handle Form Submission Action
        document.getElementById('checkout-form').addEventListener('submit', function(e) {
            e.preventDefault();
            if (Object.keys(cart).length === 0) {
                alert("Aapka cart khali hai!");
                return;
            }
            
            alert("🎉 Awesome! Aapka order receive ho gaya hai. Hum jald hi aap se raabta karenge.");
            
            // Order placement complete hone par storage clear out settings
            localStorage.removeItem('restaurant_cart');
            window.location.href = "{% url 'home' %}";
        });
    });

    // FIX: 'def' typo hata kar sahi JavaScript native 'function' keyword reset kiya hai
    function calculateSubtotal() {
        let sub = 0;
        for (let id in cart) {
            sub += cart[id].price * cart[id].quantity;
        }
        return sub;
    }

    function renderCheckoutOrder() {
        const listContainer = document.getElementById('checkout-items-list');
        const subtotalEl = document.getElementById('checkout-subtotal');
        const discountRow = document.getElementById('discount-row');
        const discountEl = document.getElementById('checkout-discount');
        const totalEl = document.getElementById('checkout-grand-total');

        if (!listContainer) return;
        listContainer.innerHTML = '';
        
        let subtotal = calculateSubtotal();

        // Safe Fallback: Agar storage khali hai to page load hotay hi loop crash karne ke bajaye user ko menu page par redirect karega
        if (Object.keys(cart).length === 0) {
            listContainer.innerHTML = '<p class="text-center py-6 text-gray-400 text-sm">Your cart is empty.</p>';
            setTimeout(function() {
                window.location.href = "{% url 'menu' %}";
            }, 500);
            return;
        }

        for (let id in cart) {
            let item = cart[id];
            let itemTotal = item.price * item.quantity;
            
            listContainer.innerHTML += `
                <div class="flex justify-between items-center py-3.5">
                    <div>
                        <h5 class="font-bold text-gray-800 text-sm">${item.name}</h5>
                        <p class="text-xs text-gray-400 mt-0.5">$${parseFloat(item.price).toFixed(2)} &times; ${item.quantity}</p>
                    </div>
                    <span class="font-bold text-gray-700 text-sm">$${itemTotal.toFixed(2)}</span>
                </div>
            `;
        }

        // Apply dynamic discount math algorithms
        let discountAmount = (subtotal * discountPercentage) / 100;
        let finalGrandTotal = subtotal - discountAmount;

        subtotalEl.innerText = `$${subtotal.toFixed(2)}`;
        
        if (discountAmount > 0) {
            discountEl.innerText = `-$${discountAmount.toFixed(2)}`;
            discountRow.classList.remove('hidden');
        } else {
            discountRow.classList.add('hidden');
        }
        
        totalEl.innerText = `$${finalGrandTotal.toFixed(2)}`;
    }

    function applyPromoCode() {
        const promoInput = document.getElementById('promo-input').value.trim().toUpperCase();
        const messageEl = document.getElementById('promo-message');
        
        if (!messageEl) return;
        messageEl.classList.remove('hidden', 'text-green-600', 'text-red-500');
        let currentSubtotal = calculateSubtotal();
        
        if (promoInput === 'ATLAS20') {
            discountPercentage = 20;
            messageEl.innerText = "🎉 Coupon Applied! You got 20% off.";
            messageEl.classList.add('text-green-600', 'block');
        } else if (promoInput === 'FREEFRIES') {
            if (currentSubtotal >= 25.00) {
                messageEl.innerText = "🍟 Awesome! Free Truffle Fries added to your order layout.";
                messageEl.classList.add('text-green-600', 'block');
                discountPercentage = 0; 
            } else {
                messageEl.innerText = "⚠️ This code requires a minimum order value of $25.00.";
                messageEl.classList.add('text-red-500', 'block');
                discountPercentage = 0;
            }
        } else {
            discountPercentage = 0;
            messageEl.innerText = "❌ Invalid Promo Code. Please try a valid one.";
            messageEl.classList.add('text-red-500', 'block');
        }
        
        renderCheckoutOrder();
    }
</script>
{% endblock %}
